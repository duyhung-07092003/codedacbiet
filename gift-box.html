<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Quà - Sinh Nhật Bé Yêu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/gift-box.css">
</head>
<body class="light-theme">
    <!-- Background Decorations -->
    <div class="bg-decorations">
        <i class="fas fa-gift decor-1"></i>
        <i class="fas fa-heart decor-2"></i>
        <i class="fas fa-sparkles decor-3"></i>
        <i class="fas fa-star decor-4"></i>
        <i class="fas fa-cake-candles decor-5"></i>
    </div>

    <!-- Audio Control -->
    <div class="audio-control">
        <button id="audioToggle" title="Bật/tắt nhạc" class="audio-btn">
            <i class="fas fa-music"></i>
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <main class="gift-box-page">
        <div class="gift-box-container">
            <div class="gift-box" id="giftBox">
                <div class="gift-box-front">
                    <i class="fas fa-heart" style="color: white; font-size: 3rem; opacity: 0.8;"></i>
                </div>
                <div class="gift-box-left"></div>
                <div class="gift-box-right"></div>
                <div class="gift-box-top" id="giftBoxTop"></div>
                <div class="gift-box-bottom"></div>
                <div class="gift-ribbon-h"></div>
                <div class="gift-ribbon-v"></div>
                <div class="gift-bow"></div>
            </div>
            <canvas id="confettiCanvas" class="confetti-canvas"></canvas>
        </div>

        <div class="gift-message" id="giftMessage" style="opacity: 0; pointer-events: none;">
            <h1>🎂 Chúc Mừng Sinh Nhật 🎂</h1>
            <p>Đến nơi kỷ niệm của chúng mình thôi nào!</p>
            <a href="timeline.html" class="btn btn-primary">
                Tiếp Tục <i class="fas fa-arrow-right ml-2"></i>
            </a>
        </div>

        <div class="navigation">
            <a href="index.html" class="btn btn-secondary btn-small">
                <i class="fas fa-chevron-left mr-1"></i> Quay Lại
            </a>
        </div>
    </main>

    <script src="js/confetti.js"></script>
    <script src="js/gift-box.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

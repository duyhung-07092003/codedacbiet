<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bé Yêu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cover.css">
    <style>
        /* Intro Video Styles */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #000;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .skip-intro {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-body);
            backdrop-filter: blur(5px);
            z-index: 10000;
        }
        .slide-left {
            transform: translateX(-100%);
        }
    </style>
</head>
<body class="light-theme">
    
    <!-- Decorative Photos -->
    <div class="decorative-photo" style="bottom: 50px; left: 40px; transform: rotate(-5deg);">
        <img src="anh/img/anhdep.jpeg" alt="Kỷ niệm">
    </div>
    <div class="decorative-photo" style="bottom: 80px; right: 40px; transform: rotate(8deg);">
        <img src="anh/img/anhdep2.jpeg" alt="Kỷ niệm">
    </div>

    <!-- Decorations
    <i class="fas fa-heart decor-img decor-tl" style="color: #fecaca;"></i>
    <i class="fas fa-star decor-img decor-tr" style="color: #fef08a;"></i>
    <i class="fas fa-cloud decor-img decor-bl" style="color: #bae6fd;"></i>
    <i class="fas fa-cat decor-img decor-br" style="color: #e9d5ff;"></i> -->

    <!-- Intro Video -->
    <div id="intro-container">
        <video id="intro-video" playsinline>
            <source src="anh/img/received_568992858137073.mp4" type="video/mp4">
        </video>
        <div class="skip-intro" onclick="startApp()">Chạm để bắt đầu ➔</div>
    </div>

    <!-- Audio Control -->
    <div class="audio-control">
        <button id="audioToggle" class="audio-btn"><i class="fas fa-music"></i></button>
    </div>
    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <!-- Cover Page -->
    <main class="cover-page">
        <canvas id="particleCanvas" class="particle-canvas"></canvas>
        <div class="cover-content">
            <div class="floating-hearts">
                <i class="fas fa-heart heart h1"></i>
                <i class="fas fa-heart heart h2"></i>
                <i class="fas fa-heart heart h3"></i>
            </div>
            <h1 class="cover-title">Happy Birthday</h1>
            <h2 class="cover-subtitle">Gửi Bé Yêu Của Anh</h2>
            <p class="cover-message">Mỗi khoảnh khắc bên em đều là một món quà vô giá...</p>
            <a href="timeline.html" class="btn btn-primary btn-gift">
                <i class="fas fa-heart mr-2"></i> Khám Phá Hành Trình
            </a>
        </div>
    </main>

    <script src="js/particles.js"></script>
    <script src="js/main.js"></script>
    <script>
        const video = document.getElementById('intro-video');
        const container = document.getElementById('intro-container');

        function startApp() {
            container.classList.add('slide-left');
            const bgMusic = document.getElementById('bgMusic');
            if (bgMusic) {
                bgMusic.play().catch(e => console.log("Autoplay blocked"));
            }
            setTimeout(() => {
                container.style.display = 'none';
            }, 1200);
        }

        video.onended = startApp;
        
        // Nhấn vào bất kỳ đâu để start nếu video không tự chạy
        container.onclick = () => {
            video.play();
            // Ẩn nút skip khi đã bấm
            document.querySelector('.skip-intro').style.display = 'none';
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Cho Em - Sinh Nhật Bé Yêu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/video.css">
</head>
<body class="light-theme">
    <!-- Background Decorations -->
    <div class="bg-decorations">
        <i class="fas fa-video decor-1"></i>
        <i class="fas fa-heart decor-2"></i>
        <i class="fas fa-sparkles decor-3"></i>
        <i class="fas fa-play-circle decor-4"></i>
        <i class="fas fa-star decor-5"></i>
    </div>

    <!-- Audio Control -->
    <div class="audio-control">
        <button id="audioToggle" title="Bật/tắt nhạc" class="audio-btn">
            <i class="fas fa-music"></i>
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <main class="video-page">
        <header class="video-header">
            <h1>📹 Video Dành Riêng Cho Em 📹</h1>
            <p>Một chút bất ngờ nhỏ anh đã chuẩn bị</p>
        </header>

        <div class="video-container">
            <iframe 
                width="100%" 
                height="500" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="Lời nhắn cho em"
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="video-note">
            <p><i class="fas fa-heart mr-2" style="color: var(--primary-rose);"></i> Hy vọng em sẽ thích món quà tinh thần này của anh!</p>
        </div>

        <!-- Navigation -->
        <div class="page-nav">
            <a href="reasons.html" class="btn btn-secondary btn-small">
                <i class="fas fa-arrow-left mr-1"></i> Quay Lại
            </a>
            <a href="camera.html" class="btn btn-primary btn-small">
                Tiếp Theo <i class="fas fa-arrow-right ml-1"></i>
            </a>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
